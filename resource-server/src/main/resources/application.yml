spring:
  application:
    name: api-server

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER}
      
  jpa:
    hibernate:
      ddl-auto: none
      show-sql: true

  flyway:
    enabled: true
    baseline-on-migration: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          set_uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}
server:
  port: 8080